<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Purchase Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Share Purchase Calculator</h1>
        <form id="calculatorForm">
            <label for="lots">Enter number of lots:</label>
            <input type="number" id="lots" name="lots" min="1" required>
            <button type="submit">Calculate</button>
        </form>
        <p id="result">Total Amount: ₹0</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
